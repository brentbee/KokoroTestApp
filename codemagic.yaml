workflows:
  kokoro-adhoc:
    name: KokoroTestApp Ad Hoc
    max_build_duration: 90
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: codemagic-asc

    environment:
      xcode: latest
      ios_signing:
        distribution_type: ad_hoc
        bundle_identifier: com.brent.kokoro-test

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Download Metal Toolchain
        script: xcodebuild -downloadComponent MetalToolchain

      - name: Set up keychain
        script: keychain initialize

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Use provisioning profiles
        script: xcode-project use-profiles

      - name: Resolve SPM dependencies
        script: |
          xcodebuild -resolvePackageDependencies \
            -project KokoroTestApp.xcodeproj \
            -scheme KokoroTestApp

      - name: Build and archive
        script: |
          xcodebuild -project KokoroTestApp.xcodeproj \
            -scheme KokoroTestApp \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -archivePath build/KokoroTestApp.xcarchive \
            archive

      - name: Export IPA
        script: |
          cat > build/ExportOptions.plist << 'EOPLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string>J2WC76CMRA</string>
              <key>signingStyle</key>
              <string>automatic</string>
          </dict>
          </plist>
          EOPLIST

          xcodebuild -exportArchive \
            -archivePath build/KokoroTestApp.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist build/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - brent.beeltje@gmail.com
        notify:
          success: true
          failure: true
